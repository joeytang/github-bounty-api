services:
  - type: web
    name: github-bounty-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 10000
      - key: GITHUB_TOKEN
        sync: false  # You'll need to set this in Render dashboard
    autoDeploy: true
    branch: main
