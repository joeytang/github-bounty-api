services:
  - type: web
    name: github-bounty-api
    env: python
    plan: free
    buildCommand: |
      export CARGO_HOME=/tmp/cargo
      export CARGO_TARGET_DIR=/tmp/cargo-target
      export RUSTUP_HOME=/tmp/rustup
      mkdir -p $CARGO_HOME $CARGO_TARGET_DIR $RUSTUP_HOME
      pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 10000
      - key: GITHUB_TOKEN
        sync: false  # You'll need to set this in Render dashboard
      - key: CARGO_HOME
        value: /tmp/cargo
      - key: CARGO_TARGET_DIR
        value: /tmp/cargo-target
      - key: RUSTUP_HOME
        value: /tmp/rustup
    autoDeploy: true
    branch: main
